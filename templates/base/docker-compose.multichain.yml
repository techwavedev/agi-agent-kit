# MultiChain — Blockchain-Authenticated Agent Memory
# Usage: docker compose -f docker-compose.multichain.yml up -d

services:
  multichain:
    build:
      context: ./docker/multichain
      dockerfile: Dockerfile
    container_name: agi-multichain
    ports:
      - "4730:4730"   # JSON-RPC API
      - "4731:4731"   # Peer-to-peer network
    volumes:
      - multichain_data:/root/.multichain
    environment:
      CHAIN_NAME: agi-memory-chain
      RPC_USER: agiadmin
      RPC_PASS: agipass123
      RPC_PORT: "4730"
      NETWORK_PORT: "4731"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "multichain-cli", "agi-memory-chain", "getinfo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  multichain_data:
