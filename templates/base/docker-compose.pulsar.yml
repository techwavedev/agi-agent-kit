# Apache Pulsar — Real-Time Agent Event Bus
# Usage: docker compose -f docker-compose.pulsar.yml up -d
# Only needed for real-time push between agents (optional)

services:
  pulsar:
    image: apachepulsar/pulsar:4.1.3
    container_name: agi-pulsar
    ports:
      - "${PULSAR_PORT:-6650}:6650"         # Binary protocol
      - "${PULSAR_HTTP_PORT:-8080}:8080"     # HTTP admin API
    volumes:
      - pulsar_data:/pulsar/data
      - pulsar_conf:/pulsar/conf
    command: bin/pulsar standalone
    environment:
      PULSAR_MEM: "-Xms256m -Xmx512m"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin/v2/brokers/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pulsar_data:
  pulsar_conf:
