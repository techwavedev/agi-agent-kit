version: '3.8'

services:
  langfuse-server:
    image: ghcr.io/langfuse/langfuse:latest
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - NEXTAUTH_SECRET=myawesome-nextauth-secret
      - SALT=myawesome-salt
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - LANGFUSE_S3_MEDIA_BUCKET_NAME=langfuse
      - LANGFUSE_S3_MEDIA_BUCKET_REGION=us-east-1
      - LANGFUSE_S3_MEDIA_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_MEDIA_SECRET_ACCESS_KEY=minioadmin

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - langfuse_minio_data:/data

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  langfuse_db_data:
  langfuse_minio_data:
