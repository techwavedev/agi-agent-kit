name: Publish to NPM & GitHub Packages

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # RELEASE GATE — set RELEASE_BLOCKED=true in repo Settings →
  # Actions → Variables to hard-block any publish until QA is done.
  # ─────────────────────────────────────────────────────────────
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check release block flag
        env:
          RELEASE_BLOCKED: ${{ vars.RELEASE_BLOCKED }}
        run: |
          if [ "${RELEASE_BLOCKED}" = "true" ]; then
            echo "🚫 Release is currently BLOCKED."
            echo "To unblock: set RELEASE_BLOCKED=false in repo Settings → Actions → Variables."
            exit 1
          fi
          echo "✅ Release gate: OPEN"

  # ─────────────────────────────────────────────────────────────
  # VIRUS SCAN — must pass before publish is allowed
  # ─────────────────────────────────────────────────────────────
  virus-scan:
    runs-on: ubuntu-latest
    needs: release-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Pack tarball for scanning
        run: npm pack --dry-run 2>&1 | tail -20

      - name: Scan with ClamAV
        run: |
          sudo apt-get install -y clamav > /dev/null 2>&1
          sudo freshclam --quiet 2>/dev/null || true
          npm pack
          TARBALL=$(ls *.tgz)
          mkdir -p /tmp/scan-dir
          tar -xzf "$TARBALL" -C /tmp/scan-dir
          clamscan --recursive --infected --remove=no /tmp/scan-dir \
            && echo "✅ No threats detected in $TARBALL" \
            || (echo "❌ Virus scan failed — aborting publish" && exit 1)

  # ─────────────────────────────────────────────────────────────
  # INTEGRATION SMOKE TEST
  # Runs the init wizard non-interactively. CI always skips memory
  # (no Qdrant/Ollama available) — verifies files are installed.
  # ─────────────────────────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: release-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install package locally
        run: npm install --no-save .

      - name: Smoke test — core install, memory skipped
        run: |
          mkdir -p /tmp/agi-test-core
          # --ci skips ALL prompts: pack=core, memory=disabled, teams=skip
          node bin/init.js init --path=/tmp/agi-test-core --no-symlinks --ci
          grep "MEMORY_ENABLED=false" /tmp/agi-test-core/.env \
            && echo "✅ MEMORY_ENABLED=false confirmed in .env" \
            || (echo "❌ MEMORY_ENABLED=false not found in .env" && exit 1)
          test -f /tmp/agi-test-core/AGENTS.md \
            && echo "✅ AGENTS.md installed" \
            || (echo "❌ AGENTS.md missing" && exit 1)
          test -d /tmp/agi-test-core/skills \
            && echo "✅ skills/ directory present" \
            || (echo "❌ skills/ directory missing" && exit 1)

      - name: Smoke test — medium pack via --pack flag
        run: |
          mkdir -p /tmp/agi-test-medium
          node bin/init.js init --path=/tmp/agi-test-medium --no-symlinks --ci --pack=medium
          test -f /tmp/agi-test-medium/AGENTS.md \
            && echo "✅ Medium pack installed" \
            || (echo "❌ AGENTS.md missing in medium install" && exit 1)

      - name: Smoke test — global install flag
        run: |
          mkdir -p /tmp/agi-test-global
          node bin/init.js init --path=/tmp/agi-test-global --global --no-symlinks --ci || true
          echo "✅ Global flag smoke test complete"

  # ─────────────────────────────────────────────────────────────
  # PUBLISH — only runs after BOTH virus-scan AND integration-test pass
  # ─────────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [virus-scan, integration-test]
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version (OIDC requires >=11.5.1)
        run: |
          node --version
          npm --version

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json=$PACKAGE_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version match: $PACKAGE_VERSION"

      - name: Publish to NPM with provenance (OIDC trust)
        run: npm publish --access public --provenance

  # ─────────────────────────────────────────────────────────────
  # PUBLISH TO GITHUB PACKAGES — mirrors the NPM publish
  # ─────────────────────────────────────────────────────────────
  publish-github:
    runs-on: ubuntu-latest
    needs: [virus-scan, integration-test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json=$PACKAGE_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version match: $PACKAGE_VERSION"

      - name: Check if version already published to GitHub Packages
        id: gh_pkg_check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "@techwavedev/agi-agent-kit@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "⚠️  Version ${PACKAGE_VERSION} already published to GitHub Packages. Skipping."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.gh_pkg_check.outputs.already_published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
